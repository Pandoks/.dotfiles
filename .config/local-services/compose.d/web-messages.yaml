services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: web-messages
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=true
    env_file:
      - /Users/pandoks/.config/local-services/.env
    volumes:
      - tailscale-state:/var/lib/tailscale
    configs:
      - source: tailscale-serve
        target: /config/serve.json
    restart: unless-stopped

configs:
  tailscale-serve:
    content: |
      {
        "TCP": {
          "443": {
            "HTTPS": true
          }
        },
        "Web": {
          "web-messages.tailb2c81d.ts.net:443": {
            "Handlers": {
              "/": {
                "Proxy": "http://host.docker.internal:55001"
              }
            }
          }
        }
      }

volumes:
  tailscale-state:
